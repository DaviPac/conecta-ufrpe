<div>
  <div class="flex items-center justify-center">
    <div
      class="login-container shadow-2xl bg-white dark:bg-gray-900 p-8 rounded-lg dark:border dark:border-gray-700 w-full max-w-md"
    >
      <h2 class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-gray-100">
        Login SIGAA
      </h2>

      <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-5">
        <div>
          <p-inputgroup class="py-2">
            <p-inputgroup-addon>
              <i class="pi pi-user"></i>
            </p-inputgroup-addon>
            <p-ifta-label>
              <input id="username" name="username" type="text" pInputText fluid [(ngModel)]="username" [disabled]="loading" [invalid]="isUsernameInvalid">
              <label for="username">Usuário</label>
            </p-ifta-label>
          </p-inputgroup>
          <p-inputgroup class="py-2">
            <p-inputgroup-addon>
              <i class="pi pi-lock"></i>
            </p-inputgroup-addon>
            <p-ifta-label>
              <p-password [(ngModel)]="password" inputId="password" name="password" feedback="false" toggleMask="true" [(ngModel)]="password" [disabled]="loading" [invalid]="isPasswordInvalid"/>
              <label for="password">Senha</label>
            </p-ifta-label>
          </p-inputgroup>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <p-checkbox [(ngModel)]="rememberMe" [binary]="true" name="remembermMe" value="rememberMe" inputId="rememberMe"/>
            <label for="rememberMe" class="ml-2 block text-sm text-gray-900 dark:text-gray-300 cursor-pointer">
              Mantenha-me conectado
            </label>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md font-semibold hover:bg-blue-700 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
        <p-toast/>
      </form>
    </div>
  </div>

</div>
