@if (isAuthenticated()) {
  <nav class="fixed top-0 inset-x-0 w-full z-50 hidden md:block bg-white/80 backdrop-blur-xl shadow-[0_4px_30px_rgba(0,0,0,0.03)] border-b border-slate-200/50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0">
            <a [routerLink]="['/']" class="text-xl font-bold tracking-tighter cursor-pointer flex items-center gap-2 group">
              <i class="pi pi-book text-amber-600 group-hover:scale-110 transition-transform duration-300"></i> 
              <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-500">SIGAA</span>
            </a>
          </div>

          <div class="hidden md:block ml-10">
            <div class="flex items-baseline space-x-8">
              <a
                [routerLink]="['/']"
                [routerLinkActiveOptions]="{ exact: true }"
                routerLinkActive="text-blue-700 font-semibold after:w-full"
                class="relative text-slate-500 hover:text-blue-700 py-5 text-sm transition-colors duration-300 cursor-pointer after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-blue-600 after:transition-all after:duration-300 hover:after:w-full"
              >
                Início
              </a>

              <a
                [routerLink]="['/calendario']"
                routerLinkActive="text-blue-700 font-semibold after:w-full"
                class="relative text-slate-500 hover:text-blue-700 py-5 text-sm transition-colors duration-300 cursor-pointer after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-blue-600 after:transition-all after:duration-300 hover:after:w-full"
              >
                Calendário
              </a>

              <a
                [routerLink]="['/profile']"
                routerLinkActive="text-blue-700 font-semibold after:w-full"
                class="relative text-slate-500 hover:text-blue-700 py-5 text-sm transition-colors duration-300 cursor-pointer after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-blue-600 after:transition-all after:duration-300 hover:after:w-full"
              >
                Perfil
              </a>

              <a
                [routerLink]="['/settings']"
                routerLinkActive="text-blue-700 font-semibold after:w-full"
                class="relative text-slate-500 hover:text-blue-700 py-5 text-sm transition-colors duration-300 cursor-pointer after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-blue-600 after:transition-all after:duration-300 hover:after:w-full flex items-center gap-1"
              >
                Configurações
                @if (hasUpdate()) {
                  <span class="relative flex h-2 w-2 mb-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                  </span>
                }
              </a>
            </div>
          </div>
        </div>

        <div class="hidden md:block">
          <button (click)="logout()" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-red-600 transition-all duration-300 px-4 py-2 rounded-xl hover:bg-red-50/80 hover:shadow-sm group" title="Sair">
            <span>Sair</span>
            <i class="pi pi-sign-out group-hover:translate-x-1 transition-transform duration-300"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <nav class="fixed top-0 inset-x-0 w-full z-50 md:hidden bg-white/80 backdrop-blur-xl shadow-[0_4px_30px_rgba(0,0,0,0.03)] border-b border-slate-200/50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-center h-16">
        <a [routerLink]="['/']" class="text-lg font-bold tracking-tighter cursor-pointer flex items-center gap-2">
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-500">SIGAA</span>
        </a>
      </div>
    </div>
  </nav>

  <nav class="fixed bottom-0 inset-x-0 w-full z-50 md:hidden bg-white/90 backdrop-blur-xl border-t border-slate-200/50 pb-safe shadow-[0_-8px_30px_rgba(0,0,0,0.04)] overflow-hidden">
    <div class="flex justify-around items-center h-16 w-full max-w-md mx-auto px-2 relative">
      <a
        [routerLink]="['/']"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive
        #rlaHome="routerLinkActive"
        (isActiveChange)="null" class="relative flex flex-col items-center justify-center w-full h-full transition-all duration-300 group"
        [class.text-blue-600]="rlaHome.isActive"
        [class.text-slate-400]="!rlaHome.isActive"
      >
        <div class="absolute top-0 w-8 h-[3px] bg-blue-600 rounded-b-full shadow-[0_2px_8px_rgba(37,99,235,0.6)] transition-opacity duration-300" [class.opacity-100]="rlaHome.isActive" [class.opacity-0]="!rlaHome.isActive"></div>
        <i class="pi pi-home text-xl mb-1 transition-transform duration-300 group-hover:scale-110" [class.drop-shadow-md]="rlaHome.isActive"></i>
        <span class="text-[10px] font-semibold tracking-wide">Início</span>
      </a>

      <a
        [routerLink]="['/calendario']"
        routerLinkActive
        #rlaCalendario="routerLinkActive"
        (isActiveChange)="null" class="relative flex flex-col items-center justify-center w-full h-full transition-all duration-300 group"
        [class.text-blue-600]="rlaCalendario.isActive"
        [class.text-slate-400]="!rlaCalendario.isActive"
      >
        <div class="absolute top-0 w-8 h-[3px] bg-blue-600 rounded-b-full shadow-[0_2px_8px_rgba(37,99,235,0.6)] transition-opacity duration-300" [class.opacity-100]="rlaCalendario.isActive" [class.opacity-0]="!rlaCalendario.isActive"></div>
        <i class="pi pi-calendar text-xl mb-1 transition-transform duration-300 group-hover:scale-110" [class.drop-shadow-md]="rlaCalendario.isActive"></i>
        <span class="text-[10px] font-semibold tracking-wide">Calendário</span>
      </a>

      <a
        [routerLink]="['/profile']"
        routerLinkActive
        #rlaProfile="routerLinkActive"
        (isActiveChange)="null" class="relative flex flex-col items-center justify-center w-full h-full transition-all duration-300 group"
        [class.text-blue-600]="rlaProfile.isActive"
        [class.text-slate-400]="!rlaProfile.isActive"
      >
        <div class="absolute top-0 w-8 h-[3px] bg-blue-600 rounded-b-full shadow-[0_2px_8px_rgba(37,99,235,0.6)] transition-opacity duration-300" [class.opacity-100]="rlaProfile.isActive" [class.opacity-0]="!rlaProfile.isActive"></div>
        <i class="pi pi-user text-xl mb-1 transition-transform duration-300 group-hover:scale-110" [class.drop-shadow-md]="rlaProfile.isActive"></i>
        <span class="text-[10px] font-semibold tracking-wide">Perfil</span>
      </a>

      <a
        [routerLink]="['/settings']"
        routerLinkActive
        #rlaSettings="routerLinkActive"
        (isActiveChange)="null" class="relative flex flex-col items-center justify-center w-full h-full transition-all duration-300 group"
        [class.text-blue-600]="rlaSettings.isActive"
        [class.text-slate-400]="!rlaSettings.isActive"
      >
        <div class="absolute top-0 w-8 h-[3px] bg-blue-600 rounded-b-full shadow-[0_2px_8px_rgba(37,99,235,0.6)] transition-opacity duration-300" [class.opacity-100]="rlaSettings.isActive" [class.opacity-0]="!rlaSettings.isActive"></div>
        
        <div class="relative">
          <i class="pi pi-cog text-xl mb-1 transition-transform duration-300 group-hover:scale-110" [class.drop-shadow-md]="rlaSettings.isActive"></i>
          @if (hasUpdate()) {
            <span class="absolute -top-1 -right-1.5 flex h-2.5 w-2.5">
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-blue-600 border-2 border-white dark:border-slate-900"></span>
            </span>
          }
        </div>
        
        <span class="text-[10px] font-semibold tracking-wide">Config.</span>
      </a>
    </div>
  </nav>

} @else {
  <nav class="fixed top-0 inset-x-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-sm border-b border-slate-200/50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-center md:justify-start h-16">
        <a [routerLink]="['/']" class="text-xl font-bold tracking-tighter cursor-pointer">
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-500">CONECTA</span> 
          <span class="text-amber-600 ml-1">UFRPE</span>
        </a>
      </div>
    </div>
  </nav>
}
